<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>AR Frame Gift</title>

    <!-- A-Frame 1.5.0 + MindAR Image Tracking -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      body {
        position: fixed;
        inset: 0;
        touch-action: manipulation;
        -webkit-user-select: none;
        user-select: none;
      }

      a-scene {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 24px;
        box-sizing: border-box;
        text-align: center;
        pointer-events: none;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.25));
      }

      .overlay.is-running {
        justify-content: flex-start;
        padding-top: max(28px, env(safe-area-inset-top));
        background: transparent;
      }

      #statusText {
        margin: 0;
        padding: 10px 14px;
        border-radius: 999px;
        color: #fff;
        font-size: 15px;
        line-height: 1.45;
        letter-spacing: 0.02em;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .buttonGroup {
        display: flex;
        flex-direction: column;
        gap: 12px;
        pointer-events: auto;
      }

      .startButton {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 14px 24px;
        color: #111;
        background: #fff;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0.02em;
        cursor: pointer;
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.35);
      }

      .startButton.secondary {
        color: #fff;
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }

      .startButton:active {
        transform: scale(0.98);
      }

      .buttonGroup[hidden] {
        display: none;
      }
    </style>
  </head>

  <body>
    <div id="overlay" class="overlay">
      <p id="statusText">請選擇啟動方式</p>

      <div id="buttonGroup" class="buttonGroup">
        <button id="startSoundButton" class="startButton" type="button">
          Start AR 開啟聲音
        </button>

        <button id="startMutedButton" class="startButton secondary" type="button">
          Start AR 靜音播放
        </button>
      </div>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets/frame.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded>

      <a-assets>
        <img id="endFrame" src="./assets/end_frame.jpg" alt="AR frame overlay" />

        <!--
          iPhone Safari 重點：
          1. 一開始保留 muted，讓影片可以安全載入與作為 WebGL texture。
          2. 使用者點擊「Start AR 開啟聲音」後，才嘗試解除靜音。
          3. playsinline / webkit-playsinline 避免 iPhone 強制全螢幕播放。
        -->
        <video
          id="danceVideo"
          src="./assets/dance.mp4"
          preload="auto"
          loop
          muted
          playsinline
          webkit-playsinline
          crossorigin="anonymous">
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <!-- 如果之後還想放底圖，可以取消這段註解
        <a-image
          src="#endFrame"
          position="0 0.18 0"
          width="1.1"
          height="1.1"
          rotation="0 0 0">
        </a-image>
        -->

        <a-video
          src="#danceVideo"
          position="0 0.18 0.01"
          width="1.1"
          height="1.1"
          rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector("a-scene");
      const targetEl = document.querySelector("#target");
      const overlayEl = document.querySelector("#overlay");
      const statusTextEl = document.querySelector("#statusText");
      const buttonGroupEl = document.querySelector("#buttonGroup");
      const startSoundButtonEl = document.querySelector("#startSoundButton");
      const startMutedButtonEl = document.querySelector("#startMutedButton");
      const danceVideoEl = document.querySelector("#danceVideo");

      let soundEnabled = false;
      let arStarted = false;

      const setStatus = (message) => {
        statusTextEl.textContent = message;
      };

      const unlockVideo = async () => {
        if (!danceVideoEl) return;

        /*
          先嘗試依照使用者選擇播放：
          - soundEnabled = true：嘗試有聲播放
          - soundEnabled = false：靜音播放

          如果 iPhone Safari 還是擋住有聲播放，就自動改成靜音，
          避免整個 AR 影片不顯示。
        */
        danceVideoEl.muted = !soundEnabled;
        danceVideoEl.playsInline = true;

        try {
          await danceVideoEl.play();
          danceVideoEl.pause();
          danceVideoEl.currentTime = 0;
        } catch (err) {
          console.warn("Video unlock with sound failed, fallback to muted:", err);

          soundEnabled = false;
          danceVideoEl.muted = true;

          try {
            await danceVideoEl.play();
            danceVideoEl.pause();
            danceVideoEl.currentTime = 0;
          } catch (mutedErr) {
            console.warn("Muted video unlock also failed:", mutedErr);
          }

          setStatus("手機阻擋聲音，已改為靜音播放");
        }
      };

      const startAR = async (enableSound) => {
        if (arStarted) return;

        arStarted = true;
        soundEnabled = enableSound;

        buttonGroupEl.hidden = true;
        overlayEl.classList.add("is-running");
        setStatus("Loading AR...");

        try {
          if (!sceneEl.hasLoaded) {
            await new Promise((resolve) => {
              sceneEl.addEventListener("loaded", resolve, { once: true });
            });
          }

          /*
            這段很重要：
            必須在使用者點擊按鈕後呼叫 play()，
            iPhone 才比較願意允許之後影片播放。
          */
          await unlockVideo();

          const mindarSystem = sceneEl.systems["mindar-image-system"];
          await mindarSystem.start();

          setStatus("Scanning... 請將相機對準 target image");
        } catch (error) {
          console.error(error);

          arStarted = false;
          buttonGroupEl.hidden = false;
          overlayEl.classList.remove("is-running");
          setStatus("無法開啟相機，請檢查瀏覽器相機權限與 HTTPS 設定。");
        }
      };

      startSoundButtonEl.addEventListener("click", () => {
        startAR(true);
      });

      startMutedButtonEl.addEventListener("click", () => {
        startAR(false);
      });

      targetEl.addEventListener("targetFound", async () => {
        setStatus(soundEnabled ? "Target found，影片播放中" : "Target found，靜音播放中");

        if (!danceVideoEl) return;

        danceVideoEl.currentTime = 0;
        danceVideoEl.muted = !soundEnabled;

        try {
          await danceVideoEl.play();
        } catch (err) {
          console.warn("Video play failed on targetFound, fallback to muted:", err);

          /*
            如果使用者選擇有聲，但 iPhone 仍然擋住，
            就退回靜音播放，至少確保畫面出得來。
          */
          soundEnabled = false;
          danceVideoEl.muted = true;

          try {
            await danceVideoEl.play();
            setStatus("Target found，但手機阻擋聲音，已改為靜音播放");
          } catch (mutedErr) {
            console.warn("Muted video play failed:", mutedErr);
            setStatus("Target found，但影片播放被手機阻擋");
          }
        }
      });

      targetEl.addEventListener("targetLost", () => {
        setStatus("Scanning... 請將相機對準 target image");

        if (danceVideoEl) {
          danceVideoEl.pause();
        }
      });
    </script>
  </body>
</html>
