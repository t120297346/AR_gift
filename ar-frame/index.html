<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>AR Frame Gift</title>

    <!-- A-Frame 1.5.0 + MindAR Image Tracking -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      body {
        position: fixed;
        inset: 0;
        touch-action: manipulation;
        -webkit-user-select: none;
        user-select: none;
      }

      a-scene {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 24px;
        box-sizing: border-box;
        text-align: center;
        pointer-events: none;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.2));
      }

      .overlay.is-running {
        justify-content: flex-start;
        padding-top: max(28px, env(safe-area-inset-top));
        background: transparent;
      }

      #statusText {
        margin: 0;
        padding: 10px 14px;
        border-radius: 999px;
        color: #fff;
        font-size: 15px;
        line-height: 1.45;
        letter-spacing: 0.02em;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      #startButton {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 14px 24px;
        color: #111;
        background: #fff;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0.02em;
        cursor: pointer;
        pointer-events: auto;
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.35);
      }

      #startButton:active {
        transform: scale(0.98);
      }

      #startButton[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="overlay" class="overlay">
      <p id="statusText">請點擊 Start AR 開啟相機</p>
      <button id="startButton" type="button">Start AR</button>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets/frame.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded>
      <a-assets>
        <img id="endFrame" src="./assets/end_frame.jpg" alt="AR frame overlay" />

        <!--
          預留透明背景影片素材。要啟用時：
          1. 取消下方 <video> 與 target 內 <a-video> 的註解。
          2. 依需求調整 <a-video> 的 width、height、position。
          3. 若手機沒有自動播放，確認影片有 muted、playsinline，並在 Start AR 點擊後呼叫 play()。

          <video
            id="danceVideo"
            src="./assets/dance.webm"
            preload="auto"
            loop
            muted
            playsinline
            webkit-playsinline
            crossorigin="anonymous"></video>
        -->
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <!--
          調整 AR 圖片：
          - width / height：控制圖片大小。
          - position="x y z"：控制圖片位置；y 越大越上方。
          - rotation：控制旋轉角度。
        -->
        <a-image
          src="#endFrame"
          position="0 0.18 0"
          width="1.1"
          height="1.1"
          rotation="0 0 0"></a-image>

        <!--
          預留透明背景影片：取消註解後會與圖片一起出現在 target 上方。
	-->
        <a-video
          src="#danceVideo"
          position="0 0.18 0.01"
          width="1.1"
          height="1.1"
          rotation="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector("a-scene");
      const targetEl = document.querySelector("#target");
      const overlayEl = document.querySelector("#overlay");
      const statusTextEl = document.querySelector("#statusText");
      const startButtonEl = document.querySelector("#startButton");
      // const danceVideoEl = document.querySelector("#danceVideo");

      const setStatus = (message) => {
        statusTextEl.textContent = message;
      };

      const startAR = async () => {
        startButtonEl.hidden = true;
        overlayEl.classList.add("is-running");
        setStatus("Loading AR...");

        try {
          if (!sceneEl.hasLoaded) {
            await new Promise((resolve) => {
              sceneEl.addEventListener("loaded", resolve, { once: true });
            });
          }

          const mindarSystem = sceneEl.systems["mindar-image-system"];
          await mindarSystem.start();

          // 啟用透明背景影片時可取消註解：
          if (danceVideoEl) {
            await danceVideoEl.play();
          }

          setStatus("Scanning... 請將相機對準 target image");
        } catch (error) {
          console.error(error);
          startButtonEl.hidden = false;
          overlayEl.classList.remove("is-running");
          setStatus("無法開啟相機，請檢查瀏覽器相機權限與 HTTPS 設定。");
        }
      };

      startButtonEl.addEventListener("click", startAR, { once: false });

      targetEl.addEventListener("targetFound", () => {
        setStatus("Target found");
      });

      targetEl.addEventListener("targetLost", () => {
        setStatus("Scanning... 請將相機對準 target image");
      });
    </script>
  </body>
</html>
